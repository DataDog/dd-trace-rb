require:
  - ./rubocop/custom_cops

# Custom cop to prevent ENV usage
CustomCops/EnvUsageCop:
  Enabled: true
  Description: 'Prevents direct usage of ENV to access environment variables'
  SafeAutoCorrect: false
  Include:
    - "lib/**/*"
  Exclude:
    - "lib/datadog/core/configuration/config_helper.rb"
    - "lib/datadog/core/configuration/deprecations.rb"

# Custom cop to enforce consistent exception logging format
CustomCops/ExceptionMessageCop:
  Enabled: true
  Description: 'Enforces consistent exception logging format: use `e.message` instead of bare `#{e}` interpolation, `e.class` instead of `e.class.name`, and require `#{e.class}` alongside any exception interpolation'
  SafeAutoCorrect: false
  Include:
    - "lib/**/*"

# Custom cop to validate environment variable strings
CustomCops/EnvStringValidationCop:
  Enabled: true
  Description: 'Prevents usage of environment variables that are not in the allowed list'
  Safe: false
  Include:
    - "lib/**/*"
  Exclude:
    - "lib/datadog/core/configuration/supported_configurations.rb"

# Enforce conventional namespace paths and one implementation class/module per file
# for new OpenFeature code. Existing legacy nesting is explicitly allowlisted.
CustomCops/OpenFeatureNamespacePathCop:
  Enabled: true
  Safe: false
  Include:
    - "lib/datadog/open_feature/**/*.rb"
  AllowedConstants:
    - "Datadog::OpenFeature::Configuration::Settings"
    - "Datadog::OpenFeature::Transport::HTTP"
    - "Datadog::OpenFeature::Transport::HTTP::Spec"
    - "Datadog::OpenFeature::Transport::HTTP::FlagevaluationsSpec"

# Require OpenFeature type errors to be represented in RBS instead of suppressed.
# The existing Class.new assignment is linked to an upstream Steep limitation.
CustomCops/OpenFeatureSteepIgnoreCop:
  Enabled: true
  Safe: false
  Include:
    - "lib/datadog/open_feature/**/*.rb"
  AllowedComments:
    - "lib/datadog/open_feature/evaluation_engine.rb:# steep:ignore IncompatibleAssignment"
