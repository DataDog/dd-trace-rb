name: 'Prepare bundle cache'

description: 'Sets up bundle cache for GitHub Actions'

outputs:
  cache-key:
    description: 'Cache key for the bundle'
    value: ${{ steps.restore-cache.outputs.cache-primary-key }}
  lockfile:
    description: 'Lockfile name'
    value: ${{ steps.lockfile.outputs.lockfile }}

runs:
  using: "composite"
  steps:
    - name: Generate unique Ruby environment key
      id: ruby-env-id
      shell: bash
      run: |
        id=$(ruby -e "puts RUBY_DESCRIPTION") # Includes patchlevel, os, and arch
        echo "id=$id" >> "$GITHUB_OUTPUT"
    - name: Resolve lockfile
      id: lockfile
      shell: bash
      env:
        LOCKFILE: lockfile-${{ steps.ruby-env-id.outputs.id }}
      run: |
        path="${BUNDLE_GEMFILE:-Gemfile}.lock"
        if [ ! -f "$path" ]; then
          echo "::error::Expected lockfile $path not found. Regenerate via the lock-dependency workflow." >&2
          exit 1
        fi
        { echo "lockfile=$LOCKFILE"; echo "path=$path"; } >> "$GITHUB_OUTPUT"
    - name: Upload lockfile
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.lockfile.outputs.lockfile }}
        path: ${{ steps.lockfile.outputs.path }}
    - name: Restore cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: restore-cache
      with:
        key: bundle-${{ steps.ruby-env-id.outputs.id }}-${{ hashFiles(steps.lockfile.outputs.path) }}
        path: "/usr/local/bundle"
    - if: steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: bundle install
    - if: steps.restore-cache.outputs.cache-hit != 'true'
      name: Save cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: "${{ steps.restore-cache.outputs.cache-primary-key }}"
        path: "/usr/local/bundle"
    - run: bundle check
      shell: bash
