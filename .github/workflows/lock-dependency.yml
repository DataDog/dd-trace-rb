name: Lock Dependencies

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions for all jobs
permissions: {}

jobs:
  dependency:
    name: Dependency changes
    runs-on: ubuntu-24.04
    outputs:
      changes: ${{ steps.changes.outputs.dependencies }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: .github/dependency_filters.yml

  lock:
    runs-on: ubuntu-24.04
    needs: dependency
    if: ${{ needs.dependency.outputs.changes == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        engine:
          # ADD NEW RUBIES HERE
          - name: ruby
            version: "4.0"
          - name: ruby
            version: "3.4"
          - name: ruby
            version: "3.3"
          - name: ruby
            version: "3.2"
          - name: ruby
            version: "3.1"
          - name: ruby
            version: "3.0"
          - name: ruby
            version: "2.7"
          - name: ruby
            version: "2.6"
          - name: ruby
            version: "2.5"
    container:
      image: ghcr.io/datadog/images-rb/engines/${{ matrix.engine.name }}:${{ matrix.engine.version }}-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/${{ matrix.engine.name }}-${{ matrix.engine.version }}.gemfile
        BUNDLE_WITHOUT: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: |
          ruby -v
          gem -v
          bundler -v
      - run: bundle lock --add-platform x86_64-linux aarch64-linux arm64-darwin x86_64-darwin
      - run: bundle install
      - run: bundle exec rake dependency:all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lock-dependency-${{ github.run_id }}-${{ matrix.engine.name }}-${{ matrix.engine.version }}
          path: |
            gemfiles/${{ matrix.engine.name }}-${{ matrix.engine.version }}.gemfile.lock
            gemfiles/${{ matrix.engine.name }}_${{ matrix.engine.version }}*
          retention-days: 1

  commit:
    name: Commit changes
    needs: lock
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-rb
          policy: self.lock-dependency
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # required for `git` operations (commit & push) at later steps
          token: ${{ steps.generate-token.outputs.token }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: gemfiles
          pattern: lock-dependency-${{ github.run_id }}-*
          merge-multiple: true
      # FIXME: The ghcommit-action does not pick up untracked/unstaged files
      #        https://github.com/planetscale/ghcommit-action/issues/43
      - name: Stage changes
        run: git add gemfiles
      - run: git diff --cached --color=always
      - name: Commit changes
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref }}
          file_pattern: "gemfiles/*"
          commit_message: "[🤖] Lock Dependency: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  complete:
    name: Lock Dependencies (complete)
    runs-on: ubuntu-24.04
    needs:
      - commit
    steps:
      - run: echo "DONE!"
