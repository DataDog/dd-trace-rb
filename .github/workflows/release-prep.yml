name: Prepare release

# Prepares a release PR for a new version:
#   1. Reads the approved GitHub draft release body for tag vX.Y.Z
#   2. Writes the changelog into CHANGELOG.md and rewrites the compare-link footer
#   3. Regenerates docs/integration_versions.md and docs/integration_versions.json
#   4. Bumps the gem version (lib/datadog/version.rb, gemfiles, tools/*.lock)
#   5. Opens a `release`-labelled PR targeting master
#
# Compose and approve the draft release first; this workflow does not publish.
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, without the v prefix (e.g. 2.36.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

# Default permissions for all jobs
permissions: {}

jobs:
  prepare-release:
    name: Prepare the release PR
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
      BUNDLE_FROZEN: "true"
    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-rb
          policy: self.release-prep

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # required for `git` operations in later steps
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "4.0.1"

      - run: bundle install

      - name: Prepare the release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ inputs.version }}
          BUNDLE_FROZEN: "false"
        run: bundle exec rake "release_prep:prepare[${VERSION}]"

      - name: Update supported integration versions
        run: bundle exec ruby .github/scripts/update_supported_versions.rb

      - name: Create release Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: bump_to_version_${{ inputs.version }}
          base: master
          title: "Bump to version ${{ inputs.version }}"
          commit-message: "Bump to version ${{ inputs.version }}"
          labels: release
          delete-branch: true
          sign-commits: true
          add-paths: |
            CHANGELOG.md
            docs/integration_versions.md
            docs/integration_versions.json
            lib/datadog/version.rb
            gemfiles
            tools/*.lock
          body: |
            Release preparation for **v${{ inputs.version }}**, generated by the
            [Prepare release](${{ github.server_url }}/${{ github.repository }}/actions/workflows/release-prep.yml) workflow.

            This PR updates `CHANGELOG.md`, `docs/integration_versions.md`, `docs/integration_versions.json`, the gem
            version, and lockfiles. Review and merge to proceed with publishing.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
