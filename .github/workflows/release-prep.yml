name: Prepare release

# Prepares a release PR for a new version:
#   1. Reads the approved GitHub draft release body for tag vX.Y.Z
#   2. Writes the changelog into CHANGELOG.md and rewrites the compare-link footer
#   3. Regenerates docs/integration_versions.md
#   4. Bumps the gem version (lib/datadog/version.rb, gemfiles, tools/*.lock)
#   5. Opens a `release`-labelled PR targeting master
#
# Compose and approve the draft release first; this workflow does not publish.
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, without the v prefix (e.g. 2.36.0)"
        required: true
        type: string
      previous_version:
        description: "Previous released version for the CHANGELOG compare link (e.g. 2.35.0). Defaults to the latest v* tag."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

# Default permissions for all jobs
permissions: {}

jobs:
  prepare-release:
    name: Prepare the release PR
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      VERSION: ${{ inputs.version }}
      PREVIOUS_VERSION: ${{ inputs.previous_version }}
      BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
      BUNDLE_FROZEN: "true"
    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-rb
          policy: self.release-prep

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true # required for `git` operations in later steps
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0 # need tags to derive previous_version

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "4.0.1"

      - run: bundle install

      - name: Validate version input
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([._-].+)?$'; then
            echo "::error::Invalid version '$VERSION' (expected e.g. 2.36.0)"
            exit 1
          fi

      - name: Resolve previous version
        run: |
          prev="$PREVIOUS_VERSION"
          if [ -z "$prev" ]; then
            prev="$(git tag --list 'v*' --sort=-version:refname | head -n1 | sed 's/^v//')"
          fi
          if [ -z "$prev" ]; then
            echo "::error::Could not determine previous version (no v* tags found); pass previous_version explicitly"
            exit 1
          fi
          echo "Using previous version: $prev"
          echo "PREVIOUS_VERSION=$prev" >> "$GITHUB_ENV"

      - name: Read approved draft release body
        env:
          GEM_VERSION: ${{ inputs.version }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const versionTag = `v${process.env.GEM_VERSION}`;
            const draftRelease = releases.find(
              release => release.tag_name === versionTag && release.draft === true
            );

            if (!draftRelease) {
              core.setFailed(`No draft release found with tag ${versionTag}. Please create and approve a draft release first.`);
              return;
            }

            const body = draftRelease.body || '';
            fs.writeFileSync(`${process.env.RUNNER_TEMP}/release_body.md`, body);
            console.log(`Wrote draft release body for ${versionTag} (${body.length} chars)`);

      - name: Insert changelog section
        env:
          BODY_FILE: ${{ runner.temp }}/release_body.md
        run: bundle exec ruby .github/scripts/release/update_changelog.rb insert

      - name: Format the changelog
        run: bundle exec rake changelog:format

      - name: Rewrite changelog footer
        run: bundle exec ruby .github/scripts/release/update_changelog.rb footer

      - name: Update supported integration versions
        run: bundle exec ruby .github/scripts/update_supported_versions.rb

      - name: Bump gem version
        run: bundle exec rake "version:bump[${VERSION}]"

      - name: Verify gemspec version matches
        run: |
          actual="$(ruby -e 'puts Gem::Specification.load(Dir.glob("*.gemspec").first).version')"
          if [ "$actual" != "$VERSION" ]; then
            echo "::error::Gemspec version '$actual' does not match requested version '$VERSION'"
            exit 1
          fi
          echo "Gemspec version '$actual' matches the requested version"

      - name: Create release Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: bump_to_version_${{ inputs.version }}
          base: master
          title: "Bump to version ${{ inputs.version }}"
          commit-message: "Bump to version ${{ inputs.version }}"
          labels: release
          delete-branch: true
          sign-commits: true
          add-paths: CHANGELOG.md,docs/integration_versions.md,lib/datadog/version.rb,gemfiles,tools/*.lock
          body: |
            Release preparation for **v${{ inputs.version }}**, generated by the
            [Prepare release](${{ github.server_url }}/${{ github.repository }}/actions/workflows/release-prep.yml) workflow.

            This PR updates `CHANGELOG.md`, `docs/integration_versions.md`, the gem
            version, and lockfiles. Review and merge to proceed with publishing.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
