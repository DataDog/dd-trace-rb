name: Static Analysis

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

# Default permissions for all jobs
permissions: {}

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/datadog/images-rb/engines/ruby:4.0-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
        BUNDLE_FROZEN: "true"
    outputs:
      lockfile: ${{ steps.bundle-cache.outputs.lockfile }}
      cache-key: ${{ steps.bundle-cache.outputs.cache-key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prepare bundle cache
        id: bundle-cache
        uses: ./.github/actions/bundle-cache

  standard:
    name: standard/lint
    runs-on: ubuntu-24.04
    needs: ['build']
    container:
      image: ghcr.io/datadog/images-rb/engines/ruby:4.0-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
        BUNDLE_FROZEN: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore bundle cache
        uses: ./.github/actions/bundle-restore
        with:
          lockfile: ${{ needs.build.outputs.lockfile }}
          cache-key: ${{ needs.build.outputs.cache-key }}
      - run: bundle exec rubocop -D
      - run: bundle exec rake standard

  rubocop:
    name: rubocop/lint
    runs-on: ubuntu-24.04
    needs: ['build']
    container:
      image: ghcr.io/datadog/images-rb/engines/ruby:4.0-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
        BUNDLE_FROZEN: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore bundle cache
        uses: ./.github/actions/bundle-restore
        with:
          lockfile: ${{ needs.build.outputs.lockfile }}
          cache-key: ${{ needs.build.outputs.cache-key }}
      - run: bundle exec rake rubocop

  steep:
    name: steep/typecheck
    runs-on: ubuntu-24.04
    needs: ['build']
    container:
      image: ghcr.io/datadog/images-rb/engines/ruby:4.0-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/ruby-4.0.gemfile
        BUNDLE_FROZEN: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore bundle cache
        uses: ./.github/actions/bundle-restore
        with:
          lockfile: ${{ needs.build.outputs.lockfile }}
          cache-key: ${{ needs.build.outputs.cache-key }}
      - name: Check for stale signature files
        run: bundle exec rake rbs:stale
      - name: Check for missing signature files
        run: bundle exec rake rbs:missing
      - name: Check types
        run: bundle exec rake steep:check
      - name: Record stats
        run: bundle exec rake steep:stats[md] >> "$GITHUB_STEP_SUMMARY"

  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-24.04
    container: semgrep/semgrep # PENDING: Possible to be rate limited.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: |
          semgrep ci \
          --include=bin/* \
          --include=ext/* \
          --include=lib/* \
          --exclude-rule=ruby.lang.security.model-attributes-attr-accessible.model-attributes-attr-accessible
        env:
          SEMGREP_RULES: p/default

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-rb
          policy: self.check
      - name: Run zizmor
        uses: docker://ghcr.io/zizmorcore/zizmor:1.26.1
        with:
          args: --min-severity low .
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.8
        with:
          args: -color

  yaml-lint:
    name: yaml-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: pip install yamllint
      - name: Run yamllint
        run: yamllint --strict .

  complete:
    name: Static Analysis (complete)
    needs:
      - 'steep'
      - 'standard'
      - 'rubocop'
      - 'semgrep'
      - 'zizmor'
      - 'actionlint'
      - 'yaml-lint'
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Done"
