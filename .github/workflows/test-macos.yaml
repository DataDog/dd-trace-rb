name: Test macOS

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Default permissions for all jobs
permissions: {}

jobs:
  test-macos:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
        ruby:
          # ADD NEW RUBIES HERE
          - version: '4.0'
            rubygems: '3.7.2'
          - version: '3.4'
            rubygems: '3.7.2'
          - version: '3.3'
            rubygems: '3.7.2'
          - version: '3.2'
            rubygems: '3.7.2'
          - version: '3.1'
            rubygems: '3.6.9'
          - version: '3.0'
            rubygems: '3.5.23'
    name: Test (${{ matrix.os }}, ${{ matrix.ruby.version }})
    runs-on: ${{ matrix.os }}
    env:
      SKIP_SIMPLECOV: 1
      DD_INSTRUMENTATION_TELEMETRY_ENABLED: false
      DD_REMOTE_CONFIGURATION_ENABLED: false
      DATADOG_GEM_CI: true
      DD_PROFILING_MACOS_TESTING: true
      BUNDLE_GEMFILE: gemfiles/ruby-${{ matrix.ruby.version }}.gemfile
      BUNDLE_FROZEN: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # bundler appears to match both prerelease and release rubies when we
      # want the former only. relax the constraint to allow any version for
      # head rubies
      - if: ${{ matrix.ruby.version == 'head' }}
        run: sed -i~ -e '/spec\.required_ruby_version/d' datadog.gemspec
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ matrix.ruby.version }}
      - name: Install rubygems
        run: gem update --system ${{ matrix.ruby.rubygems }}
      - name: Get ruby information
        run: |
          which ruby
          ruby --version
          which gem
          gem --version
          which bundle
          bundle --version
      - name: Install dependencies
        run: bundle install
      - name: Run specs
        run: bundle exec rake spec:core_with_libdatadog_api spec:main spec:profiling

  complete:
    name: Test macOS (complete)
    runs-on: ubuntu-24.04
    needs:
      - test-macos
    steps:
      - run: echo "DONE!"
