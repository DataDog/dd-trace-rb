name: System Tests

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      # A workaround to trigger the workflow for pull requests from forked repository,
      # which does not have access to secrets.
      #
      # This is also useful for testing the workflow without opening a pull request.
      - tmp/*
  pull_request:
    branches:
      - master
  workflow_dispatch: {}
  schedule:
    - cron: "00 04 * * 0-6"

# Default permissions for all jobs
permissions: {}

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-24.04
    outputs:
      changes: ${{ steps.changes.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            src:
              - '.github/forced-tests-list.cfg'
              - '.github/workflows/**'
              - 'lib/**'
              - 'ext/**'
              - '*.gemspec'
              - 'Gemfile'
              - '*.gemfile'
              - 'lib-injection/**'
              - 'tasks/**'

  build:
    needs:
      - changes
    if: ${{ needs.changes.outputs.changes == 'true' }}
    runs-on: ubuntu-22.04
    name: Build artifact
    permissions:
      packages: write
    outputs:
      forced_tests: ${{ steps.compute_forced_tests.outputs.forced_tests }}
    steps:
      - name: Checkout DataDog/dd-trace-rb
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: DataDog/dd-trace-rb
          fetch-depth: 2
          persist-credentials: false
          path: packaged/dd-trace-rb
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dd-trace-rb # The name must match the folder name so it extracts to binaries/dd-trace-rb on download
          path: packaged
      - id: compute_forced_tests
        run: |
          value=$(grep -v -E '^\s*#|^\s*$' packaged/dd-trace-rb/.github/forced-tests-list.cfg | paste -sd ',')
          echo "forced_tests=$value" >> "$GITHUB_OUTPUT"

  test:
    needs:
      - build
    uses: DataDog/system-tests/.github/workflows/system-tests.yml@a850f5637f977464395ad11f46d6c9506e95a56e  # Automated: Updated by .github/workflows/update-system-tests.yml.
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      library: ruby
      binaries_artifact: dd-trace-rb
      desired_execution_time: 300 # 5 minutes
      scenarios_groups: tracer_release
      skip_empty_scenarios: ${{ !(github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/master')) }}
      ref: a850f5637f977464395ad11f46d6c9506e95a56e # Automated: Updated by .github/workflows/update-system-tests.yml.
      force_execute: ${{ needs.build.outputs.forced_tests }}
      parametric_job_count: 8
      push_to_test_optimization: true

  complete:
    name: System Tests (complete)
    runs-on: ubuntu-24.04
    needs:
      - test
    steps:
      - run: echo "DONE!"
