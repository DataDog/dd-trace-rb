name: "Update Latest Dependency"

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# Default permissions for all jobs
permissions: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        engine:
          # ADD NEW RUBIES HERE
          - name: ruby
            version: '4.0'
          - name: ruby
            version: '3.4'
          - name: ruby
            version: '3.3'
          - name: ruby
            version: '3.2'
          - name: ruby
            version: '3.1'
          - name: ruby
            version: '3.0'
          - name: ruby
            version: '2.7'
          - name: ruby
            version: '2.6'
          - name: ruby
            version: '2.5'
    container:
      image: ghcr.io/datadog/images-rb/engines/${{ matrix.engine.name }}:${{ matrix.engine.version }}-gnu-gcc
      env:
        BUNDLE_GEMFILE: gemfiles/${{ matrix.engine.name }}-${{ matrix.engine.version }}.gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Bundle
        run: bundle install
      - name: Ensure parent lockfile platforms
        run: bundle lock --add-platform x86_64-linux aarch64-linux arm64-darwin x86_64-darwin
      - name: Update (parent level)
        run: bundle update
      - name: Update (child level)
        run: bundle exec rake edge:gemspec edge:update
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: 'gha${{ github.run_id }}-datadog-gem-${{ matrix.engine.name }}-${{ matrix.engine.version }}'
          path: |
            gemfiles/${{ matrix.engine.name }}-${{ matrix.engine.version }}.gemfile.lock
            gemfiles/${{ matrix.engine.name }}_${{ matrix.engine.version }}_*
          retention-days: 1

  aggregate:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download artifacts for all runtimes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: gemfiles
          pattern: gha${{ github.run_id }}-datadog-gem-*
          merge-multiple: true

      # Use dd-octo-sts (not GITHUB_TOKEN) so the PR opens with a token that
      # triggers downstream workflows. lock-dependency.yml must fire on this PR
      # for `dependency:propagate` to run; PRs created with GITHUB_TOKEN do not
      # dispatch workflows, so swapping the token would silently break propagation.
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-rb
          policy: self.update-latest-dependency

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: auto-generate/update-latest-dependencies
          title: '[🤖] Update Latest Dependency'
          base: master
          labels: dev/internal, integrations
          commit-message: "[🤖] Update Latest Dependency: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          delete-branch: true
          sign-commits: true
          body: |
            _This is an auto-generated PR from [here](https://github.com/DataDog/dd-trace-rb/blob/master/.github/workflows/update-latest-dependency.yml), which creates a pull request that will be continually updated with new changes until it is merged or closed)_

            The PR updates latest versions of defined dependencies. Please review the changes and merge when ready.
