experiments:
  - name: Check macrobenchmark SLO breaches
    steps:
      - name: SLO breach check
        run: fail_on_breach
        warning_range: 10
        submit_metrics_to_datadog: true
        scenarios:

          # only-tracing

          - name: normal_operation--only-tracing
            thresholds:
              - agg_http_req_duration_p50 < 60.24 ms
              - agg_http_req_duration_p99 < 115.23 ms

          - name: normal_operation--only-tracing--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 188.03 %
              - rss < 6.40 GB

          - name: normal_operation--only-tracing--puma-utilization
            thresholds:
              - cpu_usage_percentage < 169.21 %
              - rss < 3.16 GB

          - name: high_load--only-tracing
            thresholds:
              - throughput > 33.98 op/s

          - name: high_load--only-tracing--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 242.37 %
              - rss < 6.55 GB

          - name: high_load--only-tracing--puma-utilization
            thresholds:
              - cpu_usage_percentage < 219.80 %
              - rss < 3.20 GB

          # only-profiling

          - name: normal_operation--only-profiling
            thresholds:
              - agg_http_req_duration_p50 < 47.48 ms
              - agg_http_req_duration_p99 < 65.35 ms

          - name: normal_operation--only-profiling--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 158.39 %
              - rss < 6.55 GB

          - name: normal_operation--only-profiling--puma-utilization
            thresholds:
              - cpu_usage_percentage < 141.16 %
              - rss < 3.23 GB

          - name: high_load--only-profiling
            thresholds:
              - throughput > 43.26 op/s

          - name: high_load--only-profiling--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 246.91 %
              - rss < 5.73 GB

          - name: high_load--only-profiling--puma-utilization
            thresholds:
              - cpu_usage_percentage < 222.42 %
              - rss < 2.23 GB

          # only-profiling-alloc

          - name: normal_operation--only-profiling-alloc
            thresholds:
              - agg_http_req_duration_p50 < 51.13 ms
              - agg_http_req_duration_p99 < 70.85 ms

          - name: normal_operation--only-profiling-alloc--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 169.34 %
              - rss < 6.56 GB

          - name: normal_operation--only-profiling-alloc--puma-utilization
            thresholds:
              - cpu_usage_percentage < 151.36 %
              - rss < 3.24 GB

          - name: high_load--only-profiling-alloc
            thresholds:
              - throughput > 40.50 op/s

          - name: high_load--only-profiling-alloc--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 246.56 %
              - rss < 5.61 GB

          - name: high_load--only-profiling-alloc--puma-utilization
            thresholds:
              - cpu_usage_percentage < 222.34 %
              - rss < 2.26 GB

          # only-profiling-heap

          - name: normal_operation--only-profiling-heap
            thresholds:
              - agg_http_req_duration_p50 < 51.40 ms
              - agg_http_req_duration_p99 < 72.03 ms

          - name: normal_operation--only-profiling-heap--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 170.13 %
              - rss < 6.64 GB

          - name: normal_operation--only-profiling-heap--puma-utilization
            thresholds:
              - cpu_usage_percentage < 151.78 %
              - rss < 3.28 GB

          - name: high_load--only-profiling-heap
            thresholds:
              - throughput > 40.35 op/s

          - name: high_load--only-profiling-heap--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 245.87 %
              - rss < 5.48 GB

          - name: high_load--only-profiling-heap--puma-utilization
            thresholds:
              - cpu_usage_percentage < 222.44 %
              - rss < 2.06 GB

          # profiling-and-tracing

          - name: normal_operation--profiling-and-tracing
            thresholds:
              - agg_http_req_duration_p50 < 71.35 ms
              - agg_http_req_duration_p99 < 131.88 ms

          - name: normal_operation--profiling-and-tracing--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 207.57 %
              - rss < 6.57 GB

          - name: normal_operation--profiling-and-tracing--puma-utilization
            thresholds:
              - cpu_usage_percentage < 185.09 %
              - rss < 3.25 GB

          - name: high_load--profiling-and-tracing
            thresholds:
              - throughput > 32.10 op/s

          - name: high_load--profiling-and-tracing--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 251.69 %
              - rss < 6.74 GB

          - name: high_load--profiling-and-tracing--puma-utilization
            thresholds:
              - cpu_usage_percentage < 224.84 %
              - rss < 3.29 GB

          # profiling-and-tracing-and-appsec

          - name: normal_operation--profiling-and-tracing-and-appsec
            thresholds:
              - agg_http_req_duration_p50 < 67.90 ms
              - agg_http_req_duration_p99 < 134.74 ms

          - name: normal_operation--profiling-and-tracing-and-appsec--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 211.61 %
              - rss < 6.55 GB

          - name: normal_operation--profiling-and-tracing-and-appsec--puma-utilization
            thresholds:
              - cpu_usage_percentage < 188.19 %
              - rss < 3.23 GB

          - name: high_load--profiling-and-tracing-and-appsec
            thresholds:
              - throughput > 31.55 op/s

          - name: high_load--profiling-and-tracing-and-appsec--gitlab-wrapper-utilization
            thresholds:
              - cpu_usage_percentage < 249.64 %
              - rss < 6.04 GB

          - name: high_load--profiling-and-tracing-and-appsec--puma-utilization
            thresholds:
              - cpu_usage_percentage < 225.50 %
              - rss < 3.25 GB
