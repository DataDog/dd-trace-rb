require:
  - standard
  - standard-custom
  - standard-performance
  - rubocop-performance

inherit_gem:
  standard: config/base.yml
  standard-custom: config/base.yml
  standard-performance: config/base.yml

AllCops:
  TargetRubyVersion: 2.5
  Exclude:
    - appraisal/**/**
    - gemfiles/**/**
    - integration/**/**
    - lib/datadog/**/vendor/**/*
    - lib/datadog/profiling/ext/exec_monkey_patch.rb
    - vendor/bundle/**/*
  NewCops: disable
  SuggestExtensions: false

# The cops disabled below should stay in sync with .standard_todo.yml's
# "**/**" ignore list (Layout/LeadingCommentSpace has an extra reason
# there) so it stays clear which tool is, or is not, enforcing each cop.

# Require a comma in multiline literals and method calls. This avoids a comma
# immediately before a closing delimiter when the final item shares a line.

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  Enabled: false

Layout/LeadingCommentSpace:
  Enabled: false
